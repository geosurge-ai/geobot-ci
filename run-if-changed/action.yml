name: Run if changed
description: Build and run a nix package if it hasn't already succeeded

inputs:
  package:
    required: true
    description: "Nix package name to run"
  timeout:
    required: true
    description: "Timeout in seconds for running the program"
  nix_eval_flags:
    required: false
    default: ""
    description: "Extra flags for nix eval"
  retries:
    required: false
    default: "0"
    description: "Number of retry attempts on failure"

runs:
  using: composite
  steps:
    - name: Evaluate package
      id: eval
      shell: bash
      env:
        NIX_CONFIG: "access-tokens = github.com=${{ github.token }}"
        PACKAGE: ${{ inputs.package }}
        NIX_EVAL_FLAGS: ${{ inputs.nix_eval_flags }}
        REPOSITORY: ${{ github.repository }}
        REF: ${{ github.head_ref || github.ref_name }}
        REV: ${{ github.event.pull_request.head.sha || github.sha }}
      run: |
        RESULT=$(nix eval $NIX_EVAL_FLAGS --json "git+ssh://git@github.com/$REPOSITORY?ref=$REF&rev=$REV#$PACKAGE" --apply 'drv: {outPath = drv.outPath; mainProgram = drv.meta.mainProgram;}')
        OUT=$(echo "$RESULT" | nix run nixpkgs#jq -- -r '.outPath')
        MAIN=$(echo "$RESULT" | nix run nixpkgs#jq -- -r '.mainProgram')
        BIN="$OUT/bin/$MAIN"
        echo "bin=$BIN" >> $GITHUB_OUTPUT
        echo "Bin: $BIN"

    - name: Check if already succeeded
      id: check
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        BIN: ${{ steps.eval.outputs.bin }}
        REPOSITORY: ${{ github.repository }}
      run: |
        SHARD=${BIN:11:1}
        STATE_FILE=$(mktemp)

        if nix run nixpkgs#gh -- release download \
          "geobot-ci-succeed-list" \
          --repo "$REPOSITORY" \
          --pattern "succeeded-$SHARD.txt" \
          --output "$STATE_FILE" \
          --clobber \
          2>/dev/null; then
          if grep -qxF "$BIN" "$STATE_FILE"; then
            echo "Already succeeded, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
        fi
        echo "skip=false" >> $GITHUB_OUTPUT

    - name: Build
      if: steps.check.outputs.skip != 'true'
      shell: bash
      env:
        BIN: ${{ steps.eval.outputs.bin }}
      run: |
        OUT=$(dirname "$(dirname "$BIN")")
        nix build -L "$OUT"

    - name: Run
      if: steps.check.outputs.skip != 'true'
      shell: bash
      env:
        BIN: ${{ steps.eval.outputs.bin }}
        TIMEOUT: ${{ inputs.timeout }}
        RETRIES: ${{ inputs.retries }}
      run: |
        ATTEMPT=0
        MAX_ATTEMPTS=$((RETRIES + 1))
        while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
          ATTEMPT=$((ATTEMPT + 1))
          echo "Running attempt $ATTEMPT of $MAX_ATTEMPTS..."
          if timeout "$TIMEOUT" "$BIN"; then
            echo "Success!"
            exit 0
          else
            EXIT_CODE=$?
            if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
              echo "Failed with exit code $EXIT_CODE, retrying..."
              sleep 5
            else
              echo "Failed after $MAX_ATTEMPTS attempts"
              exit $EXIT_CODE
            fi
          fi
        done

    - name: Record success
      if: steps.check.outputs.skip != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        BIN: ${{ steps.eval.outputs.bin }}
        REPOSITORY: ${{ github.repository }}
      run: |
        SHARD=${BIN:11:1}
        STATE_FILE="$(mktemp -d)/succeeded-$SHARD.txt"

        if ! nix run nixpkgs#gh -- release download \
          "geobot-ci-succeed-list" \
          --repo "$REPOSITORY" \
          --pattern "succeeded-$SHARD.txt" \
          --output "$STATE_FILE" \
          2>/dev/null; then
          touch "$STATE_FILE"
        fi

        if ! grep -qxF "$BIN" "$STATE_FILE"; then
          echo "$BIN" >> "$STATE_FILE"
          nix run nixpkgs#gh -- release upload \
            "geobot-ci-succeed-list" \
            "$STATE_FILE" \
            --repo "$REPOSITORY" \
            --clobber
          echo "Recorded $BIN to shard $SHARD"
        fi
