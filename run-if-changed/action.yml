name: "Run If Changed"
description: "Build and run nix package if derivation changed or previous run failed"
inputs:
  package:
    description: "Nix package name to build and run"
    required: true
  workflow:
    description: "Workflow name to check previous run status"
    required: true
  timeout:
    description: "Timeout in seconds for nix run"
    required: false
    default: "120"
  repository:
    description: "Repository in owner/repo format"
    required: true
  base_ref:
    description: "Base ref to compare against"
    required: true
  current_sha:
    description: "Current commit SHA"
    required: true
  event_name:
    description: "GitHub event name (push or pull_request)"
    required: true
  base_branch:
    description: "Base branch name (for pull_request events)"
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - uses: geosurge-ai/geobot-ci/check-if-changed@main
      id: check
      with:
        package: ${{ inputs.package }}
        workflow: ${{ inputs.workflow }}
        repository: ${{ inputs.repository }}
        base_ref: ${{ inputs.base_ref }}
        current_sha: ${{ inputs.current_sha }}
        event_name: ${{ inputs.event_name }}
        base_branch: ${{ inputs.base_branch }}
    - name: Run package
      if: steps.check.outputs.should_run == 'true'
      shell: bash
      run: |
        REPO="git+ssh://git@github.com/${{ inputs.repository }}"
        timeout ${{ inputs.timeout }} nix run "$REPO?ref=${{ inputs.current_sha }}#${{ inputs.package }}"
