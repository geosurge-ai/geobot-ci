name: Add succeed
description: Record a successful output path to the shared state

inputs:
  out_path:
    required: true
    description: "Output path to record as succeeded"
runs:
  using: composite
  steps:
    - name: Add to succeeded list
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        OUT_PATH: ${{ inputs.out_path }}
        REPOSITORY: ${{ github.repository }}
      run: |
        SHARD=${OUT_PATH:11:1}
        STATE_FILE="$(mktemp -d)/succeeded-$SHARD.txt"

        if ! nix run nixpkgs#gh -- release download \
          "geobot-ci-succeed-list" \
          --repo "$REPOSITORY" \
          --pattern "succeeded-$SHARD.txt" \
          --output "$STATE_FILE" \
          2>/dev/null; then
          echo "Creating new state file for shard $SHARD"
          touch "$STATE_FILE"
        fi

        if grep -qxF "$OUT_PATH" "$STATE_FILE"; then
          echo "Output path already in state file"
          exit 0
        fi

        echo "$OUT_PATH" >> "$STATE_FILE"
        nix run nixpkgs#gh -- release upload \
          "geobot-ci-succeed-list" \
          "$STATE_FILE" \
          --repo "$REPOSITORY" \
          --clobber
        echo "Added output path to shard $SHARD"
