name: Add succeed
description: Record a successful build to the shared state

inputs:
  bin:
    required: true
    description: "Full path to binary (e.g. /nix/store/xxx/bin/program)"

runs:
  using: composite
  steps:
    - name: Add to succeeded list
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        BIN: ${{ inputs.bin }}
        REPOSITORY: ${{ github.repository }}
      run: |
        SHARD=${BIN:11:1}
        STATE_FILE="$(mktemp -d)/succeeded-$SHARD.txt"

        if ! nix run nixpkgs#gh -- release download \
          "geobot-ci-succeed-list" \
          --repo "$REPOSITORY" \
          --pattern "succeeded-$SHARD.txt" \
          --output "$STATE_FILE" \
          2>/dev/null; then
          touch "$STATE_FILE"
        fi

        if grep -qxF "$BIN" "$STATE_FILE"; then
          echo "Already recorded"
          exit 0
        fi

        echo "$BIN" >> "$STATE_FILE"
        nix run nixpkgs#gh -- release upload \
          "geobot-ci-succeed-list" \
          "$STATE_FILE" \
          --repo "$REPOSITORY" \
          --clobber
        echo "Recorded $BIN to shard $SHARD"
