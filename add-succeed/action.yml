name: Add succeed
description: Record a successful derivation to the shared state

inputs:
  derivation:
    required: true
    description: "Derivation path to record as succeeded"
runs:
  using: composite
  steps:
    - name: Add to succeeded list
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        DERIVATION: ${{ inputs.derivation }}
        REPOSITORY: ${{ github.repository }}
      run: |
        SHARD=${DERIVATION:11:1}
        STATE_FILE="$(mktemp -d)/succeeded-$SHARD.txt"

        if ! nix run nixpkgs#gh -- release download \
          "geobot-ci-succeed-list" \
          --repo "$REPOSITORY" \
          --pattern "succeeded-$SHARD.txt" \
          --output "$STATE_FILE" \
          2>/dev/null; then
          echo "Creating new state file for shard $SHARD"
          touch "$STATE_FILE"
        fi

        if grep -qxF "$DERIVATION" "$STATE_FILE"; then
          echo "Derivation already in state file"
          exit 0
        fi

        echo "$DERIVATION" >> "$STATE_FILE"
        nix run nixpkgs#gh -- release upload \
          "geobot-ci-succeed-list" \
          "$STATE_FILE" \
          --repo "$REPOSITORY" \
          --clobber
        echo "Added derivation to shard $SHARD"
