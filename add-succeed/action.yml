name: Add succeed
description: Record a successful derivation to the shared state

inputs:
  derivation:
    required: true
    description: "Derivation path to record as succeeded"
  state_repo:
    required: false
    default: "${{ github.repository }}"
    description: "Repository containing the succeed list release"
  state_release:
    required: false
    default: "geobot-ci-succeed-list"
    description: "Release tag containing the succeed list"

runs:
  using: composite
  steps:
    - name: Add to succeeded list
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        STATE_FILE=$(mktemp)

        # Download existing state file (or create empty)
        if ! nix run nixpkgs#gh -- release download "${{ inputs.state_release }}" --repo "${{ inputs.state_repo }}" --pattern "succeeded.txt" --output "$STATE_FILE" 2>/dev/null; then
          echo "Creating new state file"
          touch "$STATE_FILE"
        fi

        # Append derivation if not already present
        if grep -qxF "${{ inputs.derivation }}" "$STATE_FILE"; then
          echo "Derivation already in state file"
          exit 0
        fi

        echo "${{ inputs.derivation }}" >> "$STATE_FILE"
        nix run nixpkgs#gh -- release upload "${{ inputs.state_release }}" "$STATE_FILE" --repo "${{ inputs.state_repo }}" --clobber
        echo "Added derivation to state file"
