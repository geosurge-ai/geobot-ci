name: Add succeed
description: Record a successful derivation to the shared state

inputs:
  derivation:
    required: true
    description: "Derivation path to record as succeeded"
runs:
  using: composite
  steps:
    - name: Add to succeeded list
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        STATE_FILE=$(mktemp)

        # Download existing state file (or create empty)
        if ! nix run nixpkgs#gh -- release download "geobot-ci-succeed-list" --repo "${{ github.repository }}" --pattern "succeeded.txt" --output "$STATE_FILE" 2>/dev/null; then
          echo "Creating new state file"
          touch "$STATE_FILE"
        fi

        # Append derivation if not already present
        if grep -qxF "${{ inputs.derivation }}" "$STATE_FILE"; then
          echo "Derivation already in state file"
          exit 0
        fi

        echo "${{ inputs.derivation }}" >> "$STATE_FILE"
        cp "$STATE_FILE" /tmp/succeeded.txt
        nix run nixpkgs#gh -- release upload "geobot-ci-succeed-list" /tmp/succeeded.txt --repo "${{ github.repository }}" --clobber
        echo "Added derivation to state file"
