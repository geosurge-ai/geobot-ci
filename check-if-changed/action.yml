name: Check if changed
description: Check if a nix package derivation has already succeeded

inputs:
  package:
    required: true
    description: "Nix package name to check"
  nix_eval_flags:
    required: false
    default: ""
    description: "Extra flags for nix eval"
outputs:
  derivation:
    description: "Derivation path (.drv) for building - empty if should skip"
    value: ${{ steps.check.outputs.derivation }}

runs:
  using: composite
  steps:
    - name: Check if should run
      id: check
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        NIX_CONFIG: "access-tokens = github.com=${{ github.token }}"
        PACKAGE: ${{ inputs.package }}
        NIX_EVAL_FLAGS: ${{ inputs.nix_eval_flags }}
        REPOSITORY: ${{ github.repository }}
        REF: ${{ github.head_ref || github.ref_name }}
        REV: ${{ github.event.pull_request.head.sha || github.sha }}
      run: |
        DRV=$(nix eval \
          $NIX_EVAL_FLAGS \
          --raw \
          "git+ssh://git@github.com/$REPOSITORY?ref=$REF&rev=$REV#$PACKAGE.drvPath")
        echo "Derivation: $DRV"

        SHARD=${DRV:11:1}
        STATE_FILE=$(mktemp)

        if ! nix run nixpkgs#gh -- release download \
          "geobot-ci-succeed-list" \
          --repo "$REPOSITORY" \
          --pattern "succeeded-$SHARD.txt" \
          --output "$STATE_FILE" \
          --clobber \
          2>/dev/null; then
          echo "No state file for shard $SHARD, will run"
          echo "derivation=$DRV" >> $GITHUB_OUTPUT
          exit 0
        fi

        if grep -qxF "$DRV" "$STATE_FILE"; then
          echo "Derivation already succeeded, skipping"
          echo "derivation=" >> $GITHUB_OUTPUT
          exit 0
        fi

        echo "Derivation not found in state, will run"
        echo "derivation=$DRV" >> $GITHUB_OUTPUT
