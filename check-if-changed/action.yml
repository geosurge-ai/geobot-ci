name: Check if changed
description: Check if a nix package derivation has already succeeded

inputs:
  package:
    required: true
    description: "Nix package name to check"
  nix_build_flags:
    required: false
    default: ""
    description: "Extra flags for nix build"
outputs:
  should_run:
    description: "Whether the package should run"
    value: ${{ steps.check.outputs.should_run }}
  repo:
    description: "Nix flake URL for the current repo/ref/rev"
    value: ${{ steps.check.outputs.repo }}
  derivation:
    description: "Current derivation path"
    value: ${{ steps.check.outputs.derivation }}

runs:
  using: composite
  steps:
    - name: Check if should run
      id: check
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        NIX_CONFIG: "access-tokens = github.com=${{ github.token }}"
      run: |
        REPO="git+ssh://git@github.com/${{ github.repository }}"
        CURRENT_REF="${{ github.head_ref || github.ref_name }}"
        CURRENT_REV="${{ github.event.pull_request.head.sha || github.sha }}"
        CURRENT_REPO="$REPO?ref=$CURRENT_REF&rev=$CURRENT_REV"
        echo "repo=$CURRENT_REPO" >> $GITHUB_OUTPUT

        # Build current derivation
        CURRENT=$(nix build ${{ inputs.nix_build_flags }} --no-link --print-out-paths "$CURRENT_REPO#${{ inputs.package }}")
        echo "derivation=$CURRENT" >> $GITHUB_OUTPUT
        echo "Current derivation: $CURRENT"

        # Download state file
        STATE_FILE=$(mktemp)
        if ! nix run nixpkgs#gh -- release download "geobot-ci-succeed-list" --repo "${{ github.repository }}" --pattern "succeeded.txt" --output "$STATE_FILE" --clobber 2>/dev/null; then
          echo "No state file found, will run"
          echo "should_run=true" >> $GITHUB_OUTPUT
          exit 0
        fi

        # Check if current derivation exists in state file
        if grep -qxF "$CURRENT" "$STATE_FILE"; then
          echo "Derivation already succeeded, skipping"
          echo "should_run=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        echo "Derivation not found in state, will run"
        echo "should_run=true" >> $GITHUB_OUTPUT
