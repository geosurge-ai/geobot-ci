name: Check if changed
description: Check if a nix package has already succeeded, build if not

inputs:
  package:
    required: true
    description: "Nix package name to check"
  nix_eval_flags:
    required: false
    default: ""
    description: "Extra flags for nix eval"

outputs:
  bin:
    description: "Full path to binary - empty if should skip"
    value: ${{ steps.build.outputs.bin }}

runs:
  using: composite
  steps:
    - name: Evaluate package
      id: eval
      shell: bash
      env:
        NIX_CONFIG: "access-tokens = github.com=${{ github.token }}"
        PACKAGE: ${{ inputs.package }}
        NIX_EVAL_FLAGS: ${{ inputs.nix_eval_flags }}
        REPOSITORY: ${{ github.repository }}
        REF: ${{ github.head_ref || github.ref_name }}
        REV: ${{ github.event.pull_request.head.sha || github.sha }}
      run: |
        RESULT=$(nix eval $NIX_EVAL_FLAGS --json "git+ssh://git@github.com/$REPOSITORY?ref=$REF&rev=$REV#$PACKAGE" --apply 'drv: {outPath = drv.outPath; mainProgram = drv.meta.mainProgram;}')
        OUT=$(echo "$RESULT" | nix run nixpkgs#jq -- -r '.outPath')
        MAIN=$(echo "$RESULT" | nix run nixpkgs#jq -- -r '.mainProgram')
        BIN="$OUT/bin/$MAIN"
        echo "bin=$BIN" >> $GITHUB_OUTPUT
        echo "Bin: $BIN"

    - name: Check if already succeeded
      id: check
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        BIN: ${{ steps.eval.outputs.bin }}
        REPOSITORY: ${{ github.repository }}
      run: |
        SHARD=${BIN:11:1}
        STATE_FILE=$(mktemp)

        if nix run nixpkgs#gh -- release download \
          "geobot-ci-succeed-list" \
          --repo "$REPOSITORY" \
          --pattern "succeeded-$SHARD.txt" \
          --output "$STATE_FILE" \
          --clobber \
          2>/dev/null; then
          if grep -qxF "$BIN" "$STATE_FILE"; then
            echo "Already succeeded, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
        fi
        echo "skip=false" >> $GITHUB_OUTPUT

    - name: Build
      id: build
      if: steps.check.outputs.skip != 'true'
      shell: bash
      env:
        BIN: ${{ steps.eval.outputs.bin }}
      run: |
        OUT=$(dirname "$(dirname "$BIN")")
        nix build -L "$OUT"
        echo "bin=$BIN" >> $GITHUB_OUTPUT
