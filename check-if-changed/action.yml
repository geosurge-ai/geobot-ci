name: Check if changed
description: Check if a nix package derivation changed compared to base

inputs:
  package:
    required: true
    description: "Nix package name to check"
  workflow:
    required: true
    description: "Workflow name to check previous run status"
  run_job_name:
    required: true
    description: "Name of the run job to check previous status"
  nix_build_flags:
    required: false
    default: ""
    description: "Extra flags for nix build"

outputs:
  should_run:
    description: "Whether the package should run"
    value: ${{ steps.check.outputs.should_run }}
  repo:
    description: "Nix flake URL for the current repo/ref/rev"
    value: ${{ steps.check.outputs.repo }}

runs:
  using: composite
  steps:
    - name: Check if should run
      id: check
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        NIX_CONFIG: "access-tokens = github.com=${{ github.token }}"
      run: |
        REPO="git+ssh://git@github.com/${{ github.repository }}"
        CURRENT_REF="${{ github.head_ref || github.ref_name }}"
        CURRENT_REV="${{ github.event.pull_request.head.sha || github.sha }}"
        CURRENT_REPO="$REPO?ref=$CURRENT_REF&rev=$CURRENT_REV"
        echo "repo=$CURRENT_REPO" >> $GITHUB_OUTPUT

        # Find latest commit on main with successful run of this workflow/job
        BASE_REV=$(nix run nixpkgs#gh -- run list \
          --repo ${{ github.repository }} \
          --workflow "${{ inputs.workflow }}" \
          --branch "${{ github.event.repository.default_branch }}" \
          --status success \
          --json headSha,jobs \
          --limit 50 \
          --jq '[.[] | select(.jobs | any(.name | endswith("${{ inputs.run_job_name }}") and .conclusion == "success"))] | .[0].headSha // empty')

        if [[ -z "$BASE_REV" ]]; then
          echo "No previous successful run found"
          echo "should_run=true" >> $GITHUB_OUTPUT
          exit 0
        fi

        echo "Comparing against last successful run: $BASE_REV"
        BASE_URL="$REPO?rev=$BASE_REV"

        if ! BASE=$(nix build -L --no-link --print-out-paths "$BASE_URL#${{ inputs.package }}"); then
          echo "Base build failed, continuing anyway"
          echo "should_run=true" >> $GITHUB_OUTPUT
          exit 0
        fi

        CURRENT=$(nix build ${{ inputs.nix_build_flags }} --no-link --print-out-paths "$CURRENT_REPO#${{ inputs.package }}")

        if [[ "$CURRENT" != "$BASE" ]]; then
          echo "Derivation changed"
          echo "should_run=true" >> $GITHUB_OUTPUT
          exit 0
        fi

        echo "Derivation unchanged and previous run succeeded, skipping"
        echo "should_run=false" >> $GITHUB_OUTPUT
