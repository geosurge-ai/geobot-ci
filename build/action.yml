name: "Nix Build"
description: "Build nix package with custom flags"
inputs:
  package:
    description: "Nix package to build"
    required: true
  flags:
    description: "Extra flags for nix build"
    required: false
    default: ""
  repository:
    description: "Repository in owner/repo format"
    required: true
  ref:
    description: "Git ref (branch name)"
    required: true
  rev:
    description: "Git rev (commit SHA)"
    required: true
runs:
  using: "composite"
  steps:
    - name: Build package
      shell: bash
      run: |
        REPO="git+ssh://git@github.com/${{ inputs.repository }}?ref=${{ inputs.ref }}&rev=${{ inputs.rev }}"
        nix build ${{ inputs.flags }} "$REPO#${{ inputs.package }}"
