name: Run

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string
        description: "Nix package name to run"
      timeout_seconds:
        required: false
        type: number
        default: 600
        description: "Timeout in seconds for nix run"
      concurrency_group:
        required: false
        type: string
        default: ""
        description: "Concurrency group name"
      cancel_in_progress:
        required: false
        type: boolean
        default: false
        description: "Cancel in-progress runs when a new run is triggered"
    secrets:
      geobot_ssh_key:
        required: true
        description: "SSH key for git access"

jobs:
  run:
    name: Run ${{ inputs.package }}
    runs-on: self-hosted
    concurrency:
      group: ${{ inputs.concurrency_group || github.run_id }}
      cancel-in-progress: ${{ inputs.cancel_in_progress }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: geosurge-ai/geobot-ci
      - name: Setup
        uses: ./setup
        with:
          geobot_ssh_key: ${{ secrets.geobot_ssh_key }}
      - name: Run ${{ inputs.package }}
        run: |
          CURRENT_REF="${{ github.head_ref || github.ref_name }}"
          CURRENT_REV="${{ github.event.pull_request.head.sha || github.sha }}"
          REPO="git+ssh://git@github.com/${{ github.repository }}?ref=$CURRENT_REF&rev=$CURRENT_REV"
          timeout ${{ inputs.timeout_seconds }} nix run "$REPO#${{ inputs.package }}"
