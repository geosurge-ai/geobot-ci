name: Run

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string
        description: "Nix package name to build and run"
      workflow:
        required: true
        type: string
        description: "Workflow name to check previous run status"
      timeout_seconds:
        required: false
        type: number
        default: 600
        description: "Timeout in seconds for nix run"
    secrets:
      geobot_ssh_key:
        required: true
        description: "SSH key for git access"

permissions:
  actions: read

jobs:
  run:
    name: Run ${{ inputs.package }} if changed
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          repository: geosurge-ai/geobot-ci
      - uses: ./geobot-setup
        with:
          geobot_ssh_key: ${{ secrets.geobot_ssh_key }}
      - uses: ./run
        with:
          package: ${{ inputs.package }}
          workflow: ${{ inputs.workflow }}
          timeout_seconds: ${{ inputs.timeout_seconds }}
          repository: ${{ github.repository }}
          base_ref: ${{ github.base_ref }}
          base_rev: ${{ github.event.before }}
          current_ref: ${{ github.head_ref || github.ref_name }}
          current_rev: ${{ github.event.pull_request.head.sha || github.sha }}
