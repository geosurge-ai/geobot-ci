name: Run

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string
        description: "Nix package name to build and run"
      workflow:
        required: true
        type: string
        description: "Workflow name to check previous run status"
      timeout_seconds:
        required: false
        type: number
        default: 600
        description: "Timeout in seconds for nix run"
      concurrency_group:
        required: false
        type: string
        default: ""
        description: "Concurrency group name for the run job"
      cancel_in_progress:
        required: false
        type: boolean
        default: false
        description: "Cancel in-progress runs when a new run is triggered"
    secrets:
      geobot_ssh_key:
        required: true
        description: "SSH key for git access"

permissions:
  actions: read

jobs:
  check:
    name: Check ${{ inputs.package }}
    runs-on: self-hosted
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: geosurge-ai/geobot-ci
      - name: Setup
        uses: ./setup
        with:
          geobot_ssh_key: ${{ secrets.geobot_ssh_key }}
      - name: Check if should run
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="git+ssh://git@github.com/${{ github.repository }}"

          # Determine base rev to compare against:
          # - PR event: always use base branch HEAD (github.event.pull_request exists)
          # - Push to main: use github.event.before (previous commit)
          # - New branch push: github.event.before is all zeros, use default branch
          if [[ -n "${{ github.event.pull_request.base.sha }}" ]]; then
            # PR event - compare against base branch HEAD
            BASE_REV="${{ github.event.pull_request.base.sha }}"
          elif [[ -n "${{ github.event.before }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            # Push event - compare against previous commit
            BASE_REV="${{ github.event.before }}"
          else
            # New branch - compare against default branch HEAD
            BASE_REV=$(git ls-remote "git@github.com:${{ github.repository }}.git" "${{ github.event.repository.default_branch }}" | cut -f1)
          fi
          BASE_URL="$REPO?rev=$BASE_REV"

          if ! BASE=$(nix build -L --no-link --print-out-paths "$BASE_URL#${{ inputs.package }}"); then
            echo "Base build failed, continuing anyway"
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          CURRENT_REF="${{ github.head_ref || github.ref_name }}"
          CURRENT_REV="${{ github.event.pull_request.head.sha || github.sha }}"
          CURRENT=$(nix build --no-link --print-out-paths "$REPO?ref=$CURRENT_REF&rev=$CURRENT_REV#${{ inputs.package }}")

          if [[ "$CURRENT" != "$BASE" ]]; then
            echo "Derivation changed"
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Query job-level status (not workflow-level) for granular skip logic
          RUN_ID=$(nix run nixpkgs#gh -- run list --repo ${{ github.repository }} --commit "$BASE_REV" --workflow "${{ inputs.workflow }}" --json databaseId -q '.[0].databaseId')
          if [[ -z "$RUN_ID" ]]; then
            echo "No previous run found"
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          PREV_STATUS=$(nix run nixpkgs#gh -- api "repos/${{ github.repository }}/actions/runs/$RUN_ID/jobs" \
            --jq '.jobs[] | select(.name | endswith("Run ${{ inputs.package }}")) | .conclusion')
          if [[ -z "$PREV_STATUS" || "$PREV_STATUS" != "success" ]]; then
            echo "Previous job not found or failed"
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Derivation unchanged and previous run succeeded, skipping"
          echo "should_run=false" >> $GITHUB_OUTPUT

  run:
    name: Run ${{ inputs.package }}
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: self-hosted
    concurrency:
      group: ${{ inputs.concurrency_group || github.run_id }}
      cancel-in-progress: ${{ inputs.cancel_in_progress }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: geosurge-ai/geobot-ci
      - name: Setup
        uses: ./setup
        with:
          geobot_ssh_key: ${{ secrets.geobot_ssh_key }}
      - name: Run ${{ inputs.package }}
        run: |
          CURRENT_REF="${{ github.head_ref || github.ref_name }}"
          CURRENT_REV="${{ github.event.pull_request.head.sha || github.sha }}"
          REPO="git+ssh://git@github.com/${{ github.repository }}?ref=$CURRENT_REF&rev=$CURRENT_REV"
          timeout ${{ inputs.timeout_seconds }} nix run "$REPO#${{ inputs.package }}"
