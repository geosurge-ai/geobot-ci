name: Run

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string
        description: "Nix package name to build and run"
      workflow:
        required: true
        type: string
        description: "Workflow name to check previous run status"
      timeout_seconds:
        required: false
        type: number
        default: 600
        description: "Timeout in seconds for nix run"
    secrets:
      geobot_ssh_key:
        required: true
        description: "SSH key for git access"

permissions:
  actions: read

jobs:
  run:
    name: Run ${{ inputs.package }} if changed
    runs-on: self-hosted
    steps:
      - name: Setup
        uses: geosurge-ai/geobot-ci/setup@main
        with:
          geobot_ssh_key: ${{ secrets.geobot_ssh_key }}
      - name: Check if should run
        id: check
        uses: geosurge-ai/geobot-ci/check-if-changed@main
        with:
          package: ${{ inputs.package }}
          workflow: ${{ inputs.workflow }}
          run_job_name: Run ${{ inputs.package }} if changed
      - name: Run ${{ inputs.package }}
        if: steps.check.outputs.should_run == 'true'
        run: |
          CURRENT_REF="${{ github.head_ref || github.ref_name }}"
          CURRENT_REV="${{ github.event.pull_request.head.sha || github.sha }}"
          REPO="git+ssh://git@github.com/${{ github.repository }}?ref=$CURRENT_REF&rev=$CURRENT_REV"
          timeout ${{ inputs.timeout_seconds }} nix run "$REPO#${{ inputs.package }}"
