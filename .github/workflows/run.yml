name: Run

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string
        description: "Nix package name to build and run"
      workflow:
        required: true
        type: string
        description: "Workflow name to check previous run status"
      timeout_seconds:
        required: false
        type: number
        default: 600
        description: "Timeout in seconds for nix run"
    secrets:
      geobot_ssh_key:
        required: true
        description: "SSH key for git access"

permissions:
  actions: read

jobs:
  run:
    name: Run ${{ inputs.package }} if changed
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          repository: geosurge-ai/geobot-ci
      - name: Setup
        uses: ./setup
        with:
          geobot_ssh_key: ${{ secrets.geobot_ssh_key }}
      - name: Check if should run
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="git+ssh://git@github.com/${{ github.repository }}"

          # Determine base rev to compare against:
          # - Push event: github.event.before contains the previous commit SHA
          # - PR event: github.event.before is empty, use base branch HEAD
          # - New branch push: github.event.before is all zeros, treat like PR
          if [[ -n "${{ github.event.before }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            # Push event - compare against previous commit
            BASE_REV="${{ github.event.before }}"
          else
            # PR or new branch - compare against base branch HEAD
            BASE_REV=$(git ls-remote origin "${{ github.base_ref }}" | cut -f1)
          fi
          BASE_URL="$REPO?rev=$BASE_REV"

          if ! BASE=$(nix build --no-link --print-out-paths "$BASE_URL#${{ inputs.package }}" 2>&1); then
            echo "Base build failed (new package?), running"
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          CURRENT_REF="${{ github.head_ref || github.ref_name }}"
          CURRENT_REV="${{ github.event.pull_request.head.sha || github.sha }}"
          CURRENT=$(nix build --no-link --print-out-paths "$REPO?ref=$CURRENT_REF&rev=$CURRENT_REV#${{ inputs.package }}")

          if [[ "$CURRENT" != "$BASE" ]]; then
            echo "Derivation changed"
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Query job-level status (not workflow-level) for granular skip logic
          RUN_ID=$(gh run list --repo ${{ github.repository }} --commit "$BASE_REV" --workflow "${{ inputs.workflow }}" --json databaseId -q '.[0].databaseId')
          if [[ -z "$RUN_ID" ]]; then
            echo "No previous run found"
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          PREV_STATUS=$(gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID/jobs" \
            --jq '.jobs[] | select(.name | endswith("Run ${{ inputs.package }} if changed")) | .conclusion')
          if [[ -z "$PREV_STATUS" || "$PREV_STATUS" != "success" ]]; then
            echo "Previous job not found or failed"
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Derivation unchanged and previous run succeeded, skipping"
          echo "should_run=false" >> $GITHUB_OUTPUT
      - name: Run ${{ inputs.package }}
        if: steps.check.outputs.should_run == 'true'
        run: |
          CURRENT_REF="${{ github.head_ref || github.ref_name }}"
          CURRENT_REV="${{ github.event.pull_request.head.sha || github.sha }}"
          REPO="git+ssh://git@github.com/${{ github.repository }}?ref=$CURRENT_REF&rev=$CURRENT_REV"
          timeout ${{ inputs.timeout_seconds }} nix run "$REPO#${{ inputs.package }}"
