name: Check If Changed

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string
        description: "Nix package name to check"
      workflow:
        required: true
        type: string
        description: "Workflow name to check previous run status"
    secrets:
      geobot_ssh_key:
        required: true
        description: "SSH key for git access"
    outputs:
      should_run:
        description: "Whether the package should run"
        value: ${{ jobs.check.outputs.should_run }}

permissions:
  actions: read

jobs:
  check:
    runs-on: self-hosted
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: geosurge-ai/geobot-ci/geobot-setup@main
        with:
          geobot_ssh_key: ${{ secrets.geobot_ssh_key }}
      - uses: geosurge-ai/geobot-ci/check-if-changed@main
        id: check
        with:
          package: ${{ inputs.package }}
          workflow: ${{ inputs.workflow }}
          repository: ${{ github.repository }}
          base_ref: ${{ github.event.before }}
          current_sha: ${{ github.sha }}
          event_name: ${{ github.event_name }}
          base_branch: ${{ github.base_ref }}
