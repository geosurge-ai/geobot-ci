name: Check If Changed

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string
        description: "Nix package name to check"
      workflow:
        required: true
        type: string
        description: "Workflow name to check previous run status"
    secrets:
      geobot_ssh_key:
        required: true
        description: "SSH key for git access"
    outputs:
      should_run:
        description: "Whether the package should run"
        value: ${{ jobs.check.outputs.should_run }}

permissions:
  actions: read

jobs:
  check:
    runs-on: self-hosted
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: geosurge-ai/geobot-ci
      - uses: ./geobot-setup
        with:
          geobot_ssh_key: ${{ secrets.geobot_ssh_key }}
      - uses: ./check-if-changed
        id: check
        with:
          package: ${{ inputs.package }}
          workflow: ${{ inputs.workflow }}
          repository: ${{ github.repository }}
          base_ref: ${{ github.base_ref || 'main' }}
          current_ref: ${{ github.head_ref || github.ref_name }}
          current_rev: ${{ github.event.pull_request.head.sha || github.sha }}
