name: "Run If Changed"
description: "Build and run nix package if derivation changed or previous run failed"
inputs:
  package:
    description: "Nix package name to build and run"
    required: true
  workflow:
    description: "Workflow name to check previous run status"
    required: true
  timeout_seconds:
    description: "Timeout in seconds for nix run"
    required: false
    default: "600"
  repository:
    description: "Repository in owner/repo format"
    required: true
  base_ref:
    description: "Base branch/ref to compare against"
    required: true
  current_ref:
    description: "Current branch/ref"
    required: true
  current_rev:
    description: "Current commit SHA"
    required: true
runs:
  using: "composite"
  steps:
    - name: Check if should run
      id: check
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        REPO="git+ssh://git@github.com/${{ inputs.repository }}"

        if ! BASE=$(nix build --no-link --print-out-paths "$REPO?ref=${{ inputs.base_ref }}#${{ inputs.package }}" 2>&1); then
          echo "Base build failed (new package?), running"
          echo "should_run=true" >> $GITHUB_OUTPUT
          exit 0
        fi

        CURRENT=$(nix build --no-link --print-out-paths "$REPO?ref=${{ inputs.current_ref }}&rev=${{ inputs.current_rev }}#${{ inputs.package }}")

        if [[ "$CURRENT" != "$BASE" ]]; then
          echo "Derivation changed"
          echo "should_run=true" >> $GITHUB_OUTPUT
          exit 0
        fi

        PREV_STATUS=$(nix run nixpkgs#gh -- run list --repo ${{ inputs.repository }} --branch ${{ inputs.base_ref }} --workflow "${{ inputs.workflow }}" --json conclusion -q '.[0].conclusion')
        if [[ "$PREV_STATUS" != "success" ]]; then
          echo "Previous run failed"
          echo "should_run=true" >> $GITHUB_OUTPUT
          exit 0
        fi

        echo "Derivation unchanged and previous run succeeded, skipping"
        echo "should_run=false" >> $GITHUB_OUTPUT
    - name: Run package
      if: steps.check.outputs.should_run == 'true'
      shell: bash
      run: |
        REPO="git+ssh://git@github.com/${{ inputs.repository }}?ref=${{ inputs.current_ref }}&rev=${{ inputs.current_rev }}"
        timeout ${{ inputs.timeout_seconds }} nix run "$REPO#${{ inputs.package }}"
